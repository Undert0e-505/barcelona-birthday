// ── Init ──
function init() {
    const params = new URLSearchParams(window.location.search);
    currentPerson = params.get('who');
    
    // Load custom items from localStorage
    const stored = localStorage.getItem('bcn_custom');
    if (stored) { try { customItems = JSON.parse(stored); } catch(e) {} }
    
    // Load votes from localStorage
    if (currentPerson) {
        const storedVotes = localStorage.getItem('bcn_votes_' + currentPerson);
        if (storedVotes) { try { votes = JSON.parse(storedVotes); } catch(e) {} }
        renderPersonSelection();
        loadSHAFromGitHub();
    }
    
    setupCarousel();
    setupNav();
    renderItems();
}

// ── Carousel ──
function setupCarousel() {
    const container = document.getElementById('carousel');
    CAROUSEL_IMGS.forEach((src, i) => {
        const img = document.createElement('img');
        img.src = src;
        img.alt = 'Barcelona';
        img.loading = 'lazy';
        if (i === 0) img.classList.add('active');
        container.appendChild(img);
    });
    let current = 0;
    setInterval(() => {
        const imgs = container.querySelectorAll('img');
        imgs[current].classList.remove('active');
        current = (current + 1) % imgs.length;
        imgs[current].classList.add('active');
    }, 4000);
}

// ── Nav ──
function setupNav() {
    document.querySelectorAll('.nav-btn').forEach(btn => {
        btn.addEventListener('click', () => {
            currentCategory = btn.dataset.cat;
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            renderItems();
        });
    });
}

    const url = new URL(window.location);
    url.searchParams.set('who', person);
    window.history.replaceState({}, '', url);
    
    const storedVotes = localStorage.getItem('bcn_votes_' + currentPerson);
    if (storedVotes) { try { votes = JSON.parse(storedVotes); } catch(e) {} }
    
    renderPersonSelection();
    loadSHAFromGitHub();
    renderItems();
}

function renderPersonSelection() {
    document.querySelectorAll('.person-btn').forEach(btn => {
        btn.classList.toggle('active', btn.classList.contains(currentPerson));
    });
    document.querySelector('.who-are-you h2').textContent = `You're voting as: ${currentPerson.charAt(0).toUpperCase() + currentPerson.slice(1)}`;
}

// ── Render items ──
function renderItems() {
    const allItems = [...ITEMS, ...customItems];
    const filtered = currentCategory === 'all' ? allItems : allItems.filter(i => i.cat === currentCategory);
    const cats = currentCategory === 'all' ? ['sights','activities','food','beach'] : [currentCategory];
    const catLabels = { sights:'🏛️ Sights & Landmarks', activities:'🎯 Activities & Experiences', food:'🍽️ Food & Drink', beach:'🏖️ Beach' };
    
    let html = '';
    cats.forEach(cat => {
        const catItems = filtered.filter(i => i.cat === cat);
        if (!catItems.length) return;
        html += `<div class="cat-header">${catLabels[cat]}</div>`;
        catItems.forEach(item => {
            const myVote = votes[item.id] || '';
            html += `
            <div class="item-card">
                <img class="item-thumb" src="${item.img}" alt="${item.name}" loading="lazy" onerror="this.style.display='none'">
                <div class="item-body">
                    <div class="item-name">${item.name}</div>
                    <div class="item-desc">${item.desc}</div>
                    <a class="item-link" href="${item.link}" target="_blank" rel="noopener">More info →</a>
                    <div class="vote-row">
                        <button class="vote-btn love ${myVote==='love'?'selected':''}" onclick="vote('${item.id}','love')">❤️ Must</button>
                        <button class="vote-btn ok ${myVote==='ok'?'selected':''}" onclick="vote('${item.id}','ok')">🤷 Maybe</button>
                        <button class="vote-btn nah ${myVote==='nah'?'selected':''}" onclick="vote('${item.id}','nah')">👎 Nah</button>
                    </div>
                </div>
            </div>`;
        });
    });
    document.getElementById('itemsList').innerHTML = html || '<p style="text-align:center;color:#555;padding:2rem;">Nothing here yet. Add something!</p>';
}

// ── Vote ──
function vote(itemId, vote) {
    if (!currentPerson) { alert('Pick who you are first!'); return; }
    votes[itemId] = votes[itemId] === vote ? '' : vote;
    localStorage.setItem('bcn_votes_' + currentPerson, JSON.stringify(votes));
    renderItems();
    saveToGitHub();
}

// ── Add item ──
function addItem() {
    const name = document.getElementById('newItemName').value.trim();
    const cat = document.getElementById('newItemCategory').value;
    if (!name) return;
    const id = 'custom_' + name.toLowerCase().replace(/[^a-z0-9]/g,'_') + '_' + Date.now();
    const item = { id, name, desc: 'Added to the list!', cat, img: 'https://images.unsplash.com/photo-1523531294919-4bcd7c65e216?w=400&h=300&fit=crop', link: '#' };
    customItems.push(item);
    localStorage.setItem('bcn_custom', JSON.stringify(customItems));
    document.getElementById('newItemName').value = '';
    renderItems();
    saveToGitHub();
}

// ── GitHub backend ──
async function loadSHAFromGitHub() {
    if (typeof GITHUB_TOKEN === 'undefined' || GITHUB_TOKEN === 'PLACEHOLDER_PUT_YOUR_TOKEN_HERE') return;
    try {
        const res = await fetch(`https://api.github.com/repos/${GITHUB_REPO}/contents/votes/${currentPerson}.json?ref=${GITHUB_BRANCH}`, {
            headers: { 'Authorization': `Bearer ${GITHUB_TOKEN}`, 'Accept': 'application/vnd.github+json' }
        });
        if (res.ok) {
            const data = await res.json();
            shaMap[currentPerson] = data.sha;
            const content = JSON.parse(atob(data.content));
            // Merge: GitHub wins for existing items, localStorage wins for newer local changes
            votes = { ...votes, ...content };
            localStorage.setItem('bcn_votes_' + currentPerson, JSON.stringify(votes));
            renderItems();
        }
    } catch(e) { console.log('Load SHA failed:', e); }
}

async function saveToGitHub() {
    if (typeof GITHUB_TOKEN === 'undefined' || GITHUB_TOKEN === 'PLACEHOLDER_PUT_YOUR_TOKEN_HERE') {
        document.getElementById('saveStatus').textContent = '💾 Saved locally (add GitHub token to config.js to sync)';
        document.getElementById('saveStatus').className = 'save-status saved';
        return;
    }
    
    clearTimeout(saveTimeout);
    document.getElementById('saveStatus').textContent = '⏳ Saving...';
    document.getElementById('saveStatus').className = 'save-status saving';
    
    saveTimeout = setTimeout(async () => {
        try {
            const body = {
                message: `Update votes for ${currentPerson}`,
                content: btoa(JSON.stringify(votes)),
                branch: GITHUB_BRANCH
            };
            if (shaMap[currentPerson]) body.sha = shaMap[currentPerson];
            
            const res = await fetch(`https://api.github.com/repos/${GITHUB_REPO}/contents/votes/${currentPerson}.json`, {
                method: 'PUT',
                headers: { 'Authorization': `Bearer ${GITHUB_TOKEN}`, 'Accept': 'application/vnd.github+json', 'Content-Type': 'application/json' },
                body: JSON.stringify(body)
            });
            
            if (res.ok) {
                const data = await res.json();
                shaMap[currentPerson] = data.content.sha;
                document.getElementById('saveStatus').textContent = '✅ Saved!';
                document.getElementById('saveStatus').className = 'save-status saved';
            } else {
                const err = await res.json();
                console.error('Save failed:', err);
                document.getElementById('saveStatus').textContent = '⚠️ Save failed — check console';
                document.getElementById('saveStatus').className = 'save-status';
            }
        } catch(e) {
            document.getElementById('saveStatus').textContent = '⚠️ Connection error';
            document.getElementById('saveStatus').className = 'save-status';
        }
    }, 1000);
}

init();
</script>
</body>
</html>
